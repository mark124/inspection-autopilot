<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Inspection Autopilot</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%2310161d'/%3E%3Cpath d='M32 8 L52 16 V32 C52 45 43 53 32 57 C21 53 12 45 12 32 V16 Z' fill='none' stroke='%232d72d2' stroke-width='4' stroke-linejoin='round'/%3E%3Cpath d='M22 32 L29 39 L43 24' stroke='%232ea36f' stroke-width='6' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
<style>
  :root { --bg:#f6f7f9; --card:#fff; --ink:#1c2127; --muted:#5f6b7c; --line:#d3d8de;
          --urgent:#c5303c; --elevated:#c87619; --routine:#2d72d2; --ok:#238551; }
  * { box-sizing:border-box; }
  body { margin:0; font:14px/1.5 -apple-system, "Segoe UI", Roboto, sans-serif;
         background:var(--bg); color:var(--ink); }
  header { background:#10161d; color:#fff; padding:14px 22px; display:flex;
           align-items:baseline; gap:14px; flex-wrap:wrap; }
  header h1 { font-size:17px; margin:0; font-weight:600; }
  header .sub { color:#9aa5b1; font-size:12.5px; }
  #mode { margin-left:auto; font-size:12px; padding:3px 10px; border-radius:99px;
          background:#394b59; }
  #mode.live { background:var(--ok); }
  main { max-width:1060px; margin:20px auto; padding:0 16px; }
  .outcomes { display:none; gap:10px; margin-bottom:16px; flex-wrap:wrap; }
  .otile { flex:1 1 180px; background:var(--card); border:1px solid var(--line);
           border-radius:8px; padding:10px 14px; }
  .otile .big { font-size:22px; font-weight:700; }
  .otile.URGENT .big { color:var(--urgent); } .otile.ELEVATED .big { color:var(--elevated); }
  .otile.ROUTINE .big { color:var(--routine); }
  .otile .lbl { font-size:12px; color:var(--muted); }
  .ocap { flex-basis:100%; font-size:12px; color:var(--muted); margin-top:-4px; }
  .bar { display:flex; gap:10px; align-items:center; margin-bottom:10px; flex-wrap:wrap; }
  button { font:inherit; padding:7px 14px; border:1px solid var(--line); border-radius:6px;
           background:var(--card); cursor:pointer; }
  button.primary { background:#2d72d2; border-color:#2d72d2; color:#fff; font-weight:600; }
  button:disabled { opacity:.5; cursor:default; }
  .stats { color:var(--muted); font-size:13px; }
  #err { display:none; background:#fdecea; border:1px solid var(--urgent); color:var(--urgent);
         border-radius:6px; padding:8px 12px; margin-bottom:12px; cursor:pointer; font-size:13px; }
  .chips { display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; }
  .chip { background:var(--card); border:1px solid var(--line); border-radius:99px;
          font-size:12px; color:var(--muted); padding:3px 12px; }
  .chip b { color:var(--ink); }
  .card { background:var(--card); border:1px solid var(--line); border-radius:8px;
          padding:14px 16px; margin-bottom:12px; }
  .row1 { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  .tier { font-size:11.5px; font-weight:700; letter-spacing:.04em; padding:2px 9px;
          border-radius:99px; color:#fff; }
  .tier.URGENT { background:var(--urgent); } .tier.ELEVATED { background:var(--elevated); }
  .tier.ROUTINE { background:var(--routine); }
  .fac { font-weight:600; }
  .atype { font-family:Consolas, monospace; font-size:12px; color:var(--ink);
           background:#eef1f4; border:1px solid var(--line); border-radius:5px; padding:1px 8px; }
  .meta { color:var(--muted); font-size:12.5px; }
  .rationale { margin:8px 0 0; }
  .cites { margin:6px 0 0; padding-left:18px; color:var(--muted); font-size:12.5px; }
  .draft { margin-top:8px; background:#f1f3f5; border-left:3px solid var(--line);
           padding:8px 12px; font-size:13px; white-space:pre-wrap; }
  .lint { display:inline-block; margin-top:8px; font-size:12px; font-weight:600;
          padding:2px 10px; border-radius:99px; }
  .lint.ok { background:#e5f2ec; color:var(--ok); }
  .lint.warn { background:#fbeee0; color:var(--elevated); }
  .record summary { cursor:pointer; margin-top:8px; }
  .actions { margin-top:10px; display:flex; gap:8px; }
  .approve { border-color:var(--ok); color:var(--ok); font-weight:600; }
  .reject { border-color:var(--urgent); color:var(--urgent); }
  .status { font-size:12px; font-weight:600; }
  .status.approved, .status.auto_approved { color:var(--ok); }
  .status.rejected { color:var(--urgent); }
  .tabs { display:flex; gap:4px; margin-bottom:14px; flex-wrap:wrap; }
  .tabs button.active { background:#10161d; color:#fff; border-color:#10161d; }
  .empty { color:var(--muted); text-align:center; padding:40px 0; }
  #rules { font-size:12.5px; color:var(--muted); margin-bottom:14px; }
  .dayhead { font-weight:700; margin:16px 0 8px; }
  .srow { display:flex; gap:10px; align-items:center; background:var(--card);
          border:1px solid var(--line); border-radius:8px; padding:9px 14px; margin-bottom:8px;
          flex-wrap:wrap; }
  .srow .addr { color:var(--muted); font-size:12.5px; }
  .srow .due { margin-left:auto; font-size:12.5px; color:var(--muted); }
  .srow.overdue { border-color:var(--urgent); }
  .srow.overdue .due { color:var(--urgent); font-weight:700; }
</style>
</head>
<body>
<header>
  <h1>Inspection Autopilot</h1>
  <span class="sub">Clayton County food safety &middot; Qwen triage &middot; human-approved actions</span>
  <span id="mode">loading&hellip;</span>
</header>
<main>
  <div class="outcomes" id="outcomes"></div>
  <div class="bar">
    <button class="primary" id="runBtn" onclick="runBatch()">Run agent on next 5 inspections</button>
    <span class="stats" id="runStatus"></span>
  </div>
  <div id="err" onclick="this.style.display='none'" title="click to dismiss"></div>
  <div class="chips" id="chips"></div>
  <div id="rules"></div>
  <div class="tabs">
    <button id="tab-proposed" class="active" onclick="setTab('proposed')">Approval queue</button>
    <button id="tab-schedule" onclick="setTab('schedule')">Re-inspection schedule</button>
    <button id="tab-all" onclick="setTab('all')">Action log</button>
  </div>
  <div id="list"><div class="empty">Loading&hellip;</div></div>
</main>
<script>
let tab = 'proposed';

async function j(url, opts) {
  const r = await fetch(url, opts);
  if (!r.ok) {
    let msg = await r.text();
    try { msg = JSON.parse(msg).detail || msg; } catch (_) {}
    const e = new Error(msg); e.status = r.status; throw e;
  }
  return r.json();
}

function esc(t) { const d = document.createElement('div'); d.textContent = t == null ? '' : String(t); return d.innerHTML; }
function showError(m) { const e = document.getElementById('err'); e.textContent = String(m).slice(0, 300); e.style.display = 'block'; }
function note(t) { const m = document.getElementById('runStatus'); m.textContent = t; if (t) setTimeout(() => { if (m.textContent === t) m.textContent = ''; }, 8000); }

async function loadOutcomes() {
  try {
    const o = await j('/api/outcomes');
    const el = document.getElementById('outcomes');
    const tiers = ['URGENT', 'ELEVATED', 'ROUTINE'];
    el.innerHTML = tiers.map(t => {
      const d = o.tiers[t]; if (!d) return '';
      return `<div class="otile ${t}"><div class="big">${Math.round(d.next_inspection_bad_rate * 100)}%</div>
        <div class="lbl">of ${t} facilities failed their next real inspection (n=${d.n})</div></div>`;
    }).join('') + `<div class="ocap">Outcome backtest: agent tiers vs the county's own history
      (${o.n_pairs_triaged} real next-inspection pairs, base failure rate ${Math.round(o.base_bad_rate * 100)}%, live ${esc(o.model)}).</div>`;
    el.style.display = 'flex';
  } catch (_) { /* backtest not generated yet */ }
}

async function refresh() {
  try {
    const h = await j('/api/health');
    const m = document.getElementById('mode');
    m.textContent = h.mode === 'live' ? ('LIVE: ' + h.model) : 'STUB MODE (no API key)';
    m.className = h.mode;
    const s = await j('/api/stats');
    const agree = s.agreement_rate == null ? 'n/a' : Math.round(s.agreement_rate * 100) + '%';
    document.getElementById('chips').innerHTML =
      `<span class="chip"><b>${s.proposals}</b> proposals</span>` +
      `<span class="chip"><b>${s.pending}</b> pending review</span>` +
      `<span class="chip"><b>${s.human_decisions}</b> human decisions</span>` +
      `<span class="chip"><b>${s.auto_approved}</b> auto-approved by rule</span>` +
      `<span class="chip">human agreement <b>${agree}</b></span>` +
      `<span class="chip">citations dropped by validator <b>${s.citations_dropped}</b></span>`;
    const rl = await j('/api/rules');
    document.getElementById('rules').textContent =
      'Active automation rules: ' + rl.rules.map(r => r.name + ' (' + r.description + ')').join('  |  ');
    if (tab === 'schedule') {
      renderSchedule((await j('/api/schedule')).schedule);
    } else {
      const q = tab === 'proposed' ? '?status=proposed' : '';
      render((await j('/api/proposals' + q)).proposals);
    }
  } catch (e) {
    showError('Could not load data: ' + e.message);
    const el = document.getElementById('list');
    if (el.querySelector('.empty')) el.innerHTML = '<div class="empty">Failed to load. Check the server and reload.</div>';
  }
}

function lintBadge(p) {
  const l = p.params && p.params.letter_lint;
  if (!l) return '';
  if (l.unmatched_codes && l.unmatched_codes.length)
    return `<span class="lint warn">letter check: names code ${esc(l.unmatched_codes.join(', '))} NOT in this inspection's record</span>`;
  return `<span class="lint ok">letter cross-checked: ${l.codes_matched}/${l.codes_named} violation codes verified against the record</span>`;
}

function render(props) {
  const el = document.getElementById('list');
  if (!props.length) { el.innerHTML = '<div class="empty">Nothing here yet. Run the agent.</div>'; return; }
  el.innerHTML = props.map(p => `
    <div class="card">
      <div class="row1">
        <span class="tier ${p.risk_tier}">${p.risk_tier}</span>
        <span class="fac">${esc(p.facility_name)}</span>
        <span class="atype">${esc(p.action_type)}${p.params && Number(p.params.window_days) ? ' (' + Number(p.params.window_days) + ' days)' : ''}</span>
        <span class="meta">insp #${p.inspection_id} · ${esc(p.source)}</span>
        <span class="status ${p.status}" style="margin-left:auto">${p.status.replace('_',' ')}${p.decided_by ? ' · ' + esc(p.decided_by) : ''}</span>
      </div>
      <p class="rationale">${esc(p.rationale)}</p>
      ${p.citations && p.citations.length ? '<ul class="cites">' + p.citations.map(c => '<li>' + esc(c) + '</li>').join('') + '</ul>' : ''}
      ${p.draft_text ? '<div class="draft">' + esc(p.draft_text) + '</div>' : ''}
      ${lintBadge(p)}
      <details class="record" ontoggle="if(this.open && !this.dataset.loaded) loadRecord(this, ${p.inspection_id})">
        <summary class="meta">Source inspection record (what the agent read)</summary>
        <pre class="draft">loading&hellip;</pre>
      </details>
      ${p.status === 'proposed' ? `
      <div class="actions">
        <button class="approve" onclick="decide(${p.proposal_id}, 'approved')">Approve</button>
        <button class="reject" onclick="decide(${p.proposal_id}, 'rejected')">Reject</button>
      </div>` : ''}
    </div>`).join('');
}

async function loadRecord(el, id) {
  el.dataset.loaded = '1';
  try {
    const d = await j('/api/inspections/' + id + '/record');
    el.querySelector('pre').textContent = d.text;
  } catch (e) { el.querySelector('pre').textContent = 'record unavailable'; }
}

function renderSchedule(rows) {
  const el = document.getElementById('list');
  if (!rows.length) { el.innerHTML = '<div class="empty">No approved re-inspections yet. Approve one in the queue and it lands here as a dated work order.</div>'; return; }
  const today = new Date().toISOString().slice(0, 10);
  let html = '', lastDay = '';
  for (const r of rows) {
    if (r.due_date !== lastDay) { lastDay = r.due_date; html += `<div class="dayhead">Due ${esc(r.due_date)}</div>`; }
    html += `<div class="srow${r.due_date < today ? ' overdue' : ''}">
      <span class="tier ${r.risk_tier}">${r.risk_tier}</span>
      <span class="fac">${esc(r.facility_name)}</span>
      <span class="addr">${esc(r.address)}</span>
      <span class="due">${r.window_days}-day window · ${esc(r.approved_by)}</span>
    </div>`;
  }
  el.innerHTML = html;
}

async function decide(id, decision) {
  try {
    await j('/api/proposals/' + id + '/decide', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({decision, decided_by: 'supervisor'})});
  } catch (e) {
    if (e.status === 409) note('Already decided by another supervisor; refreshing.');
    else showError('Decision not recorded: ' + e.message);
  }
  refresh();
}

async function runBatch() {
  const b = document.getElementById('runBtn');
  b.disabled = true; b.textContent = 'Agent running…';
  try {
    const r = await j('/api/run?batch=5', {method: 'POST'});
    if (r.n_errors) note(`${r.n_errors} inspection(s) hit a model error; the rest were queued. Click again to retry.`);
    else if (!r.processed.length) note('All inspections have been triaged. Browse the queue, schedule, and action log.');
    else note(`Triaged ${r.processed.length} inspections · ${r.remaining} remaining`);
  } catch (e) {
    if (e.status === 409 || e.status === 429) note(e.message);
    else showError('Agent run failed: ' + e.message);
  } finally {
    b.disabled = false; b.textContent = 'Run agent on next 5 inspections';
  }
  refresh();
}

function setTab(t) {
  tab = t;
  for (const id of ['proposed', 'schedule', 'all'])
    document.getElementById('tab-' + id).className = (t === id) ? 'active' : '';
  refresh();
}
loadOutcomes();
refresh();
</script>
</body>
</html>
